name: 🐞 Fehler melden
description: Etwas funktioniert in Nidus nicht wie erwartet.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: Was ist passiert?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes vs. tatsächliches Verhalten
    validations:
      required: false
  - type: dropdown
    id: module
    attributes:
      label: Betroffener Bereich
      description: Wo tritt der Fehler auf? (Beim Melden aus der App vorausgewählt.)
      options:
        - Worldbuilding (Kategorien/Einträge)
        - Schreiben (Manuskript/Editor/Autokorrektur)
        - Notizen
        - Dashboard / Statistik
        - Export / Kompilieren
        - Papierkorb / Backup
        - Speichern / Laden / Projekt öffnen
        - Einstellungen / Themes
        - Sonstiges / unklar
    validations:
      required: false
  - type: input
    id: app-version
    attributes:
      label: Nidus-Version
      placeholder: z. B. v0.1.0
    validations:
      required: false
  - type: input
    id: windows-version
    attributes:
      label: Windows-Version
      placeholder: z. B. Windows 11
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Letzte Meldungen (automatisch)
      description: Von der App automatisch eingefügte Warnungen/Fehler. Enthält keine Projekt- oder Textinhalte; bei Bedarf kürzen.
      render: text
    validations:
      required: false
